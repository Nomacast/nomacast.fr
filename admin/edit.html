<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"> <!-- nomacast-favicon-v1 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Éditer · Admin Nomacast</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    /* nomacast-url-panel-v1 — styles du panneau "Liens de l'événement" */
    .url-row {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light, #f1f5f9);
    }
    .url-row:last-child { border-bottom: none; padding-bottom: 0; }
    .url-row:first-of-type { padding-top: 0; }
    .url-row-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-muted, #475569);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .url-row-mono {
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      background: var(--off-white, #f8fafc);
      border: 1px solid var(--border-light, #f1f5f9);
      border-radius: 6px;
      padding: 9px 11px;
      margin-bottom: 8px;
      color: var(--ink, #0f172a);
      word-break: break-all;
      line-height: 1.5;
    }
    .url-row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .url-row-hint {
      font-size: 12px;
      color: var(--ink-faint, #94a3b8);
      margin-top: 8px;
      font-style: italic;
    }
    .url-panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink, #0f172a);
      margin-bottom: 4px;
    }

    /* nomacast-stats-card-v1 — styles dashboard statistiques */
    .stats-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .stats-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink, #0f172a);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats-card-title-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink-faint, #94a3b8);
      display: inline-block;
    }
    .stats-card-title-dot.live {
      background: var(--red, #ef4444);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6);
      animation: stats-pulse 1.8s infinite;
    }
    @keyframes stats-pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .stats-card-meta {
      font-size: 11px;
      color: var(--ink-faint, #94a3b8);
    }
    .stats-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stats-tile {
      background: var(--off-white, #f8fafc);
      border: 1px solid var(--border-light, #f1f5f9);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stats-tile-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-muted, #475569);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stats-tile-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink, #0f172a);
      line-height: 1;
    }
    .stats-tile-sub {
      font-size: 11px;
      color: var(--ink-faint, #94a3b8);
      margin-top: 4px;
    }
    .stats-tile.highlight .stats-tile-value {
      color: var(--cyan, #5A98D6);
    }
    .stats-tile.live-now {
      background: rgba(239, 68, 68, 0.05);
      border-color: rgba(239, 68, 68, 0.2);
    }
    .stats-tile.live-now .stats-tile-value {
      color: var(--red, #ef4444);
    }
    .stats-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-muted, #475569);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .stats-chart-wrap {
      background: var(--off-white, #f8fafc);
      border: 1px solid var(--border-light, #f1f5f9);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 18px;
    }
    .stats-chart-svg {
      width: 100%;
      height: 180px;
      display: block;
    }
    .stats-chart-empty {
      padding: 30px 12px;
      text-align: center;
      color: var(--ink-faint, #94a3b8);
      font-size: 13px;
      font-style: italic;
    }
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .stats-table th {
      text-align: left;
      padding: 8px 10px;
      background: var(--off-white, #f8fafc);
      color: var(--ink-muted, #475569);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-light, #f1f5f9);
    }
    .stats-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-light, #f1f5f9);
      color: var(--ink, #0f172a);
    }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table td.muted { color: var(--ink-faint, #94a3b8); }
    .stats-table-empty {
      padding: 18px;
      text-align: center;
      color: var(--ink-faint, #94a3b8);
      font-size: 13px;
      font-style: italic;
    }
    .stats-present-dot {
      display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green, #10b981);
      margin-right: 6px;
      vertical-align: middle;
    }
    .stats-source-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border-light, #f1f5f9);
      color: var(--ink-muted, #475569);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .stats-source-badge.self { background: var(--cyan-light, rgba(90, 152, 214, 0.08)); color: var(--cyan, #5A98D6); }
    .stats-error {
      padding: 12px 14px;
      background: var(--red-light, rgba(239, 68, 68, 0.1));
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--red, #ef4444);
      border-radius: 8px;
      font-size: 13px;
    }
    .stats-loading {
      padding: 18px;
      text-align: center;
      color: var(--ink-faint, #94a3b8);
      font-size: 13px;
    }

    /* nomacast-client-credentials-v1 — panneau "Accès client" */
    .creds-card-body { padding: 18px 20px; }
    .creds-card-title {
      font-size: 14px; font-weight: 700; color: var(--ink, #0f172a);
      margin-bottom: 4px;
    }
    .creds-card-sub {
      font-size: 12px; color: var(--ink-faint, #94a3b8); margin-bottom: 14px;
    }
    .creds-row {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 10px 0; border-bottom: 1px solid var(--border-light, #f1f5f9);
    }
    .creds-row:last-child { border-bottom: none; }
    .creds-row-label {
      font-size: 11px; font-weight: 700; color: var(--ink-muted, #475569);
      text-transform: uppercase; letter-spacing: 0.05em;
      min-width: 90px;
    }
    .creds-row-value {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      color: var(--ink, #0f172a);
      word-break: break-all;
    }
    .creds-row-value.muted {
      color: var(--ink-faint, #94a3b8);
      font-style: italic;
      font-family: inherit;
    }
    .creds-row-actions {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .creds-login-input {
      flex: 1;
      font: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      outline: none;
      min-width: 140px;
    }
    .creds-login-input:focus {
      border-color: #5A98D6;
      box-shadow: 0 0 0 2px rgba(90, 152, 214, 0.15);
    }
    .creds-password-display {
      background: rgba(90, 152, 214, 0.08);
      border: 1px solid rgba(90, 152, 214, 0.25);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    .creds-password-display-label {
      font-size: 11px; font-weight: 700; color: #5A98D6;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .creds-password-display-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink, #0f172a);
      letter-spacing: 0.05em;
      word-break: break-all;
    }
    .creds-password-display-warn {
      font-size: 12px;
      color: #b91c1c;
      margin-top: 8px;
    }
    .creds-status-ok {
      color: #16a34a; font-size: 12px; font-weight: 600;
    }
    .creds-status-empty {
      color: #94a3b8; font-size: 12px; font-style: italic;
    }

    /* ==========================================================
       nomacast-edit-tabs-v1 — Bandeau d'onglets DATA / RÉGIE LIVE
       Pattern identique à event-admin/[token].js pour cohérence UX
       ========================================================== */
    .tabs-bar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .tabs-bar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      background: transparent;
      border: 0;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .tab-btn:hover { color: #0f172a; }
    .tab-btn.active {
      color: #5D9CEC;
      border-bottom-color: #5D9CEC;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Iframe pour la régie embarquée dans l'onglet live */
    .tab-panel-live { padding: 0; }
    .tab-iframe-wrap {
      height: calc(100vh - 110px); /* viewport moins header (50) + tabs (50) + marge */
      width: 100%;
      background: #f8fafc;
      max-width: 1280px;
      margin: 0 auto;
    }
    .tab-iframe-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>

<header class="admin-header">
  <a href="/admin/" class="admin-header-brand-link">
    <span class="admin-header-brand">
      <span class="admin-header-brand-dot"></span>
      Nomacast
    </span>
  </a>
  <div class="admin-header-title">Admin Chat interactif</div>
  <div class="admin-header-actions">
    <span class="admin-header-version" id="admin-version">build…</span>
    <a class="admin-header-link" href="/admin/">Accueil admin</a>
    <a class="admin-header-link" href="/" target="_blank" rel="noopener">Site public ↗</a>
  </div>
</header>

<!-- nomacast-edit-tabs-v1 : bandeau d'onglets DATA / RÉGIE LIVE -->
<div class="tabs-bar">
  <div class="tabs-bar-inner">
    <button type="button" class="tab-btn active" data-tab="data">Données &amp; paramètres</button>
    <button type="button" class="tab-btn" data-tab="live">Régie en direct</button>
  </div>
</div>

<main class="admin-main tab-panel tab-panel-data active" id="panel-data">

  <div class="admin-page-head">
    <div>
      <h1 id="page-title">Éditer l'event</h1>
      <div class="admin-page-head-sub" id="page-sub">Chargement…</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <span class="admin-badge" id="status-badge" hidden></span>
    </div>
  </div>

  <div id="message-zone"></div>
  <div id="public-link-zone"></div>
  <div id="credentials-zone"></div>
  <div id="stats-zone"></div>

  <div class="admin-card" id="form-container">
    <div class="admin-card-body admin-text-muted">
      <span class="admin-loader"></span> Chargement de l'event…
    </div>
  </div>

</main>

<!-- nomacast-edit-tabs-v1 : panel régie (iframe lazy-loaded au 1er clic) -->
<div class="tab-panel tab-panel-live" id="panel-live">
  <div class="tab-iframe-wrap">
    <iframe
      id="live-iframe"
      class="tab-iframe-frame"
      title="Régie en direct"
      loading="lazy"
      referrerpolicy="same-origin"></iframe>
  </div>
</div>

<script src="/admin/admin.js"></script>
<script>
(function () {
  'use strict';
  var A = window.NomacastAdmin;
  var container = document.getElementById('form-container');
  var publicLinkZone = document.getElementById('public-link-zone');
  var credentialsZone = document.getElementById('credentials-zone');
  var statsZone = document.getElementById('stats-zone');
  var pageSub = document.getElementById('page-sub');
  var statusBadge = document.getElementById('status-badge');
  var messageZone = document.getElementById('message-zone');

  var qs = new URLSearchParams(window.location.search);
  var id = qs.get('id');
  var justCreated = qs.get('created') === '1';

  // ============================================================
  // nomacast-edit-tabs-v1 : gestion onglets Données / Régie en direct
  // - Onglet par défaut : data
  // - L'iframe régie est lazy-loaded au 1er clic (data-src → src injecté avec ?id=)
  // - Persistance via fragment #live pour partage et refresh
  // ============================================================
  (function setupTabs() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    var panels = {
      data: document.getElementById('panel-data'),
      live: document.getElementById('panel-live')
    };
    var iframe = document.getElementById('live-iframe');
    var iframeLoaded = false;

    function activateTab(tabName) {
      tabBtns.forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('data-tab') === tabName);
      });
      Object.keys(panels).forEach(function (key) {
        if (panels[key]) panels[key].classList.toggle('active', key === tabName);
      });
      // Lazy load iframe au 1er clic sur "Régie en direct"
      if (tabName === 'live' && iframe && !iframeLoaded && id) {
        iframe.src = '/admin/live.html?id=' + encodeURIComponent(id);
        iframeLoaded = true;
      }
      // Persistance dans l'URL (fragment)
      var newHash = tabName === 'live' ? '#live' : '';
      if (window.location.hash !== newHash) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search + newHash);
      }
    }

    tabBtns.forEach(function (btn) {
      btn.addEventListener('click', function () { activateTab(btn.getAttribute('data-tab')); });
    });

    // Au boot : si fragment #live, activer cet onglet directement
    if (window.location.hash === '#live') activateTab('live');
  })();

  if (!id) {
    A.clearNode(container);
    container.appendChild(A.el('div', {
      className: 'admin-card-body admin-msg admin-msg-error',
      text: 'Paramètre "id" manquant dans l\'URL.'
    }));
    pageSub.textContent = '';
    return;
  }

  if (justCreated) {
    A.showMessage(messageZone, 'success', 'Event créé. Tu peux maintenant ajuster ses paramètres ou inviter des participants (à venir).');
  }

  async function load() {
    try {
      var data = await A.apiFetch('/api/admin/events/' + encodeURIComponent(id));
      renderForm(data.event);
    } catch (err) {
      A.clearNode(container);
      container.appendChild(A.el('div', {
        className: 'admin-card-body admin-msg admin-msg-error',
        text: 'Erreur de chargement : ' + err.message
      }));
      pageSub.textContent = '';
    }
  }

  // nomacast-url-panel-v1 : panneau unique avec tous les liens de l'événement
  function renderUrlPanel(ev) {
    var origin = location.origin;
    var publicLink = (ev.access_mode === 'private' && ev.admin_preview_token)
      ? origin + '/chat/' + ev.slug + '?preview=' + encodeURIComponent(ev.admin_preview_token)
      : origin + '/chat/' + ev.slug;

    var rows = [];

    rows.push(buildUrlRow(
      'Lien événement (participant)',
      publicLink,
      ev.access_mode === 'private'
        ? 'URL privée — partagez plutôt les liens personnels via les invitations'
        : 'URL publique du chat — à partager aux participants'
    ));

    // nomacast-client-credentials-v1 : URL d'accès client (login + password obligatoire)
    if (ev.client_login && ev.has_client_password) {
      rows.push(buildUrlRow(
        'Lien admin client',
        origin + '/event-admin/' + ev.client_login,
        'Le client (et toi) se connecte avec login + password. Régie + données dans une seule page.'
      ));
    } else {
      rows.push(buildUrlRow(
        'Lien admin client',
        '— Pas encore configuré —',
        '⚠ Génère un login + mot de passe dans la card « Accès client » ci-dessous pour activer l\'accès.'
      ));
    }

    if (ev.stream_uid) {
      rows.push(buildUrlRow(
        'Lien régie en direct',
        origin + '/admin/live.html?id=' + encodeURIComponent(ev.id),
        'Modération chat, sondages, annonces, preview vidéo'
      ));
      rows.push(buildUrlRow(
        'URL feed vMix',
        origin + '/admin/vmix.html?id=' + encodeURIComponent(ev.id),
        'Générer l\'URL signée pour Browser Input vMix'
      ));
    }

    return A.el('div', {
      className: 'admin-card',
      children: [
        A.el('div', {
          className: 'admin-card-body',
          children: [
            A.el('div', { className: 'url-panel-title', text: 'Liens de l\'événement' })
          ].concat(rows)
        })
      ]
    });
  }

  function buildUrlRow(label, url, hint) {
    return A.el('div', {
      className: 'url-row',
      children: [
        A.el('div', { className: 'url-row-label', text: label }),
        A.el('code', { className: 'url-row-mono', text: url }),
        A.el('div', {
          className: 'url-row-actions',
          children: [
            A.el('button', {
              className: 'admin-btn admin-btn-secondary admin-btn-sm',
              text: 'Copier',
              attrs: { type: 'button' },
              on: { click: function (e) { copyToClipboardUrl(url, e.currentTarget); } }
            }),
            A.el('a', {
              className: 'admin-btn admin-btn-ghost admin-btn-sm',
              text: 'Ouvrir ↗',
              attrs: { href: url, target: '_blank', rel: 'noopener' }
            })
          ]
        }),
        hint ? A.el('div', { className: 'url-row-hint', text: hint }) : null
      ].filter(Boolean)
    });
  }

  function copyToClipboardUrl(text, btn) {
    var origText = btn.textContent;
    function flashOk() {
      btn.textContent = 'Copié ✓';
      setTimeout(function () { btn.textContent = origText; }, 1500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(flashOk).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); flashOk(); }
      catch (e) { btn.textContent = 'Erreur'; setTimeout(function () { btn.textContent = origText; }, 1500); }
      document.body.removeChild(ta);
    }
  }

  function renderForm(ev) {
      if (ev && ev.title) document.title = 'Éditer - ' + ev.title;
    pageSub.textContent = 'Slug : ' + ev.slug + ' · Créé le ' + A.formatDate(ev.created_at);
    statusBadge.textContent = A.statusLabel(ev.status);
    statusBadge.className = 'admin-badge admin-badge-' + ev.status;
    statusBadge.hidden = false;

    // Lien régie : désormais géré dans le panneau URLs (renderUrlPanel)

    A.clearNode(container);

    // Panneau unique avec tous les liens de l'événement (cf. nomacast-url-panel-v1)
    A.clearNode(publicLinkZone);
    publicLinkZone.appendChild(renderUrlPanel(ev));
    // nomacast-stream-card-v1 : card Streaming live (rôle distinct : provisioning Cloudflare Stream)
    publicLinkZone.appendChild(A.renderStreamCard(ev, load));
    // nomacast-live-control-v1 : bouton Lancer/Terminer le direct (raccourci sans passer par régie)
    publicLinkZone.appendChild(renderLiveControlPanel(ev));

    // nomacast-client-credentials-v1 : card Accès client (login + password)
    mountCredentials(ev);

    // nomacast-stats-card-v1 : card Statistiques (mount avec polling 5s si live)
    mountStats(ev);

    var body = A.el('div', { className: 'admin-card-body' });

    var form = A.el('form', {
      className: 'admin-form',
      attrs: { autocomplete: 'off' }
    });

    // Fix 8 v2 : slug modifiable uniquement si aucun invité n'a reçu le lien
    var canChangeSlug = (ev.invitees_count || 0) === 0;

    // --- Title + Client ---
    var titleHint = canChangeSlug
      ? 'Modifie le titre affiché. L\'URL publique reste « /chat/' + ev.slug + ' » sauf si tu modifies le slug ci-dessous.'
      : 'Modifie uniquement le titre affiché. \u26A0 L\'URL publique « /chat/' + ev.slug + ' » est figée (' + ev.invitees_count + ' invité(s) ont déjà reçu ce lien).';

    form.appendChild(formRow([
      field('Titre de l\'event', true, A.el('input', {
        className: 'admin-form-input',
        attrs: { type: 'text', name: 'title', required: true, maxlength: '200', value: ev.title }
      }), titleHint),
      field('Client', false, A.el('input', {
        className: 'admin-form-input',
        attrs: { type: 'text', name: 'client_name', maxlength: '200', value: ev.client_name || '' }
      }), 'Nom de l\'entreprise organisatrice.')
    ]));

    // --- Slug d'URL (Fix 8 v2 : éditable uniquement si pas d'invités) ---
    if (canChangeSlug) {
      var slugInput = A.el('input', {
        className: 'admin-form-input',
        attrs: {
          type: 'text', name: 'slug', maxlength: '80', value: ev.slug,
          pattern: '[a-z0-9-]+',
          title: 'Lettres minuscules, chiffres et tirets uniquement'
        }
      });
      // Normalisation au blur : lowercase, accents -> ASCII, espaces/spéciaux -> -
      slugInput.addEventListener('blur', function () {
        var v = (this.value || '')
          .toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-z0-9-]+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-+|-+$/g, '');
        this.value = v;
      });
      form.appendChild(formRow([
        field('URL publique (slug)', false, slugInput,
          'L\'URL sera « /chat/' + ev.slug + ' ». Modifiable tant qu\'aucun invité n\'a reçu le lien. Sera figée définitivement dès le 1er ajout d\'invité.')
      ]));
    }

    // --- Date + Durée ---
    form.appendChild(formRow([
      field('Date et heure', true, A.el('input', {
        className: 'admin-form-input',
        attrs: { type: 'datetime-local', name: 'scheduled_at', required: true, value: A.isoToLocalInput(ev.scheduled_at) }
      })),
      field('Durée (minutes)', true, A.el('input', {
        className: 'admin-form-input',
        attrs: { type: 'number', name: 'duration_minutes', min: '1', step: '1', required: true, value: ev.duration_minutes }
      }))
    ]));

    // --- Audience + Couleur ---
    form.appendChild(formRow([
      field('Audience estimée', false, A.el('input', {
        className: 'admin-form-input',
        attrs: { type: 'number', name: 'audience_estimate', min: '1', step: '1', value: ev.audience_estimate || '' }
      })),
      field('Couleur primaire', false, (function () {
        var colorInput = A.el('input', {
          className: 'admin-form-input',
          attrs: { type: 'color', name: 'primary_color', value: ev.primary_color || '#5A98D6' }
        });
        var resetColorBtn = A.el('button', {
          className: 'admin-btn admin-btn-secondary admin-btn-sm',
          attrs: { type: 'button', title: 'Remettre la couleur Nomacast (#5A98D6)' },
          text: '↺ Nomacast',
          style: { whiteSpace: 'nowrap' },
          on: {
            click: function () {
              colorInput.value = '#5A98D6';
              // Déclencher l'event "input" pour propager au listener Fix 9 (live update preview)
              colorInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
          }
        });
        var wrap = A.el('div', {
          style: { display: 'flex', gap: '8px', alignItems: 'center' }
        });
        wrap.appendChild(colorInput);
        wrap.appendChild(resetColorBtn);
        return wrap;
      })())
    ]));

    // --- Logo client (URL + Upload + preview) ---
    var logoUrlInput = A.el('input', {
      className: 'admin-form-input',
      attrs: {
        type: 'url',
        name: 'logo_url',
        placeholder: 'https://exemple.com/logo-client.png',
        value: ev.logo_url || ''
      },
      style: { flex: '1', minWidth: '0' }
    });
    var hiddenFileInput = A.el('input', {
      attrs: {
        type: 'file',
        accept: 'image/png,image/jpeg,image/jpg,image/webp,image/svg+xml'
      },
      style: { display: 'none' }
    });
    var uploadBtn = A.el('button', {
      className: 'admin-btn admin-btn-secondary admin-btn-sm',
      attrs: { type: 'button' },
      text: 'Importer un fichier',
      style: { whiteSpace: 'nowrap' },
      on: { click: function () { hiddenFileInput.click(); } }
    });
    var removeLogoBtn = A.el('button', {
      className: 'admin-btn admin-btn-secondary admin-btn-sm',
      attrs: { type: 'button', title: 'Vider le champ logo (le logo Nomacast sera utilisé par défaut)' },
      text: '🗑 Supprimer',
      style: { whiteSpace: 'nowrap' },
      on: {
        click: function () {
          logoUrlInput.value = '';
          renderLogoPreview('');
        }
      }
    });

    // Wrapper input + boutons sur la même ligne
    var logoInputWrap = A.el('div', {
      style: { display: 'flex', gap: '8px', alignItems: 'center' }
    });
    logoInputWrap.appendChild(logoUrlInput);
    logoInputWrap.appendChild(uploadBtn);
    logoInputWrap.appendChild(removeLogoBtn);
    logoInputWrap.appendChild(hiddenFileInput);

    var logoPreview = A.el('div', {
      className: 'admin-logo-preview',
      attrs: { id: 'logo-preview' }
    });
    function renderLogoPreview(url) {
      A.clearNode(logoPreview);
      if (!url) {
        logoPreview.appendChild(A.el('span', {
          className: 'admin-text-muted',
          text: 'Aperçu : aucun logo · le logo Nomacast sera utilisé par défaut.'
        }));
        return;
      }
      var bg = form && form.primary_color ? form.primary_color.value : (ev.primary_color || '#5A98D6');
      var box = A.el('div', {
        attrs: { style: 'background:' + bg + ';padding:14px 18px;border-radius:8px;display:inline-block;' }
      });
      var img = A.el('img', {
        attrs: {
          src: url,
          alt: 'Logo client',
          style: 'display:block;max-height:48px;width:auto;border:0;'
        },
        on: {
          error: function () {
            A.clearNode(logoPreview);
            logoPreview.appendChild(A.el('span', {
              className: 'admin-msg-error-inline',
              text: '⚠ Image inaccessible à cette URL. Vérifie qu\'elle est publique et au format image (PNG/JPG/WEBP).'
            }));
          }
        }
      });
      box.appendChild(img);
      logoPreview.appendChild(box);
    }
    logoUrlInput.addEventListener('input', function () { renderLogoPreview(this.value.trim()); });
    setTimeout(function () { renderLogoPreview(ev.logo_url || ''); }, 50);

    // Fix 9 : live update du preview quand on change la couleur primaire
    setTimeout(function () {
      var colorInput = form && form.primary_color;
      if (colorInput) {
        colorInput.addEventListener('input', function () {
          renderLogoPreview(logoUrlInput.value.trim());
        });
      }
    }, 50);

    // Upload handler
    hiddenFileInput.addEventListener('change', async function () {
      var file = this.files && this.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        A.showMessage(messageZone, 'error', 'Fichier trop volumineux (max 2 Mo).');
        this.value = '';
        return;
      }

      uploadBtn.disabled = true;
      var originalText = uploadBtn.textContent;
      uploadBtn.textContent = 'Upload…';

      var formData = new FormData();
      formData.append('file', file);

      try {
        var resp = await fetch('/api/admin/upload-logo', {
          method: 'POST',
          body: formData
        });
        var result = await resp.json().catch(function () { return { error: 'Réponse invalide' }; });
        if (!resp.ok) {
          throw new Error(result.error || ('Erreur HTTP ' + resp.status));
        }
        logoUrlInput.value = result.url;
        renderLogoPreview(result.url);
        A.showMessage(messageZone, 'success', 'Logo importé · ' + Math.round(result.size / 1024) + ' Ko.');
      } catch (err) {
        A.showMessage(messageZone, 'error', 'Upload échoué : ' + err.message);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = originalText;
        hiddenFileInput.value = ''; // reset pour pouvoir re-uploader le même fichier
      }
    });

    form.appendChild(formRow([
      field(
        'Logo du client',
        false,
        logoInputWrap,
        'Colle une URL publique (PNG/JPG/WEBP/SVG, hauteur ~60–120 px conseillée) OU clique « Importer un fichier » pour uploader depuis ton ordi (max 2 Mo). Apparaîtra dans le header du mail d\'invitation et sur la page participant. Laisse vide pour utiliser le logo Nomacast par défaut.'
      )
    ], true));
    form.appendChild(A.el('div', {
      className: 'admin-form-field',
      style: { marginTop: '-12px', marginBottom: '12px' },
      children: [logoPreview]
    }));

    // --- Statut ---
    var statusSelect = A.el('select', {
      className: 'admin-form-select',
      attrs: { name: 'status' }
    });
    [['draft', 'Brouillon'], ['live', 'En direct'], ['ended', 'Terminé']].forEach(function (opt) {
      statusSelect.appendChild(A.el('option', {
        attrs: { value: opt[0], selected: ev.status === opt[0] },
        text: opt[1]
      }));
    });
    form.appendChild(formRow([
      field('Statut', false, statusSelect, 'Brouillon (caché) → En direct (chat ouvert) → Terminé (replay).')
    ], true));

    // --- Modes ---
    var modesField = fieldNoLabel('Modes d\'interaction',
      buildModesCheckboxes(ev.modes || [])
    );
    form.appendChild(modesField);
    // nomacast-modes-compat-v1 / Lot D — UI désactivation cases incompatibles
    setupModesCompat(form);

    // --- Options (white-label + subtitles) ---
    var optionsField = fieldNoLabel('Options',
      buildOptionsCheckboxes(ev.white_label, ev.subtitles)
    );
    form.appendChild(optionsField);

    // --- Mode d'accès ---
    var accessField = fieldNoLabel('Mode d\'accès',
      buildAccessRadios(ev.access_mode || 'public')
    );
    form.appendChild(accessField);

    // --- Actions ---
    var saveBtn = A.el('button', {
      className: 'admin-btn admin-btn-primary',
      attrs: { type: 'submit' },
      text: 'Enregistrer'
    });

    // Bouton Gérer les invités (toujours présent)
    var inviteesBtn = A.el('a', {
      className: 'admin-btn admin-btn-secondary',
      attrs: { href: '/admin/invitees.html?event_id=' + encodeURIComponent(ev.id) },
      text: 'Gérer les invités' + (ev.invitees_count > 0 ? ' (' + ev.invitees_count + ')' : '')
    });

    // Q4 option B : si des invités existent, Supprimer désactivé, on propose Archiver à la place
    var dangerBtn;
    if (ev.invitees_count > 0 && ev.status !== 'ended') {
      dangerBtn = A.el('button', {
        className: 'admin-btn admin-btn-secondary',
        attrs: { type: 'button' },
        text: 'Archiver (statut Terminé)',
        on: { click: function () { onArchive(ev); } }
      });
    } else if (ev.invitees_count > 0 && ev.status === 'ended') {
      dangerBtn = A.el('button', {
        className: 'admin-btn admin-btn-danger',
        attrs: { type: 'button', disabled: true, title: 'Supprime d\'abord tous les invités pour permettre la suppression' },
        text: 'Suppression bloquée (' + ev.invitees_count + ' invités)'
      });
    } else {
      dangerBtn = A.el('button', {
        className: 'admin-btn admin-btn-danger',
        attrs: { type: 'button' },
        text: 'Supprimer définitivement',
        on: { click: function () { onDelete(ev); } }
      });
    }

    var cancelBtn = A.el('a', {
      className: 'admin-btn admin-btn-ghost',
      attrs: { href: '/admin/' },
      text: 'Retour'
    });

    var actions = A.el('div', { className: 'admin-form-actions' });
    actions.appendChild(A.el('div', { className: 'admin-form-actions-left', children: [dangerBtn] }));
    actions.appendChild(inviteesBtn);
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    form.appendChild(actions);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      onSubmit(ev, form, saveBtn);
    });

    body.appendChild(form);
    container.appendChild(body);
  }

  // ============ DOM builders ============

  function formRow(fields, isFull) {
    return A.el('div', {
      className: 'admin-form-row' + (isFull ? ' full' : ''),
      children: fields
    });
  }

  function field(label, required, input, hint) {
    var children = [
      A.el('label', {
        className: 'admin-form-label' + (required ? ' admin-form-label-req' : ''),
        text: label
      }),
      input
    ];
    if (hint) children.push(A.el('div', { className: 'admin-form-hint', text: hint }));
    return A.el('div', { className: 'admin-form-field', children });
  }

  function fieldNoLabel(label, content) {
    return A.el('div', {
      className: 'admin-form-field',
      children: [
        A.el('div', { className: 'admin-form-label', text: label }),
        content
      ]
    });
  }

  function buildModesCheckboxes(activeModes) {
    var modeList = [
      ['qa', 'Q&A modéré', 'Questions soumises et approuvées avant diffusion.'],
      ['libre', 'Chat libre', 'Tous les participants peuvent écrire en direct.'],
      ['sondages', 'Sondages live', 'Le modérateur lance des sondages instantanés.'],
      ['quiz', 'Quiz interactif', 'Questions avec bonne réponse, classement à la fin.'],
      ['nuage', 'Nuage de mots-clés', 'Réponses libres agrégées en visu.'],
      ['reactions', 'Réactions rapides', 'Bravo, d\'accord, clair, insight…'],
      // nomacast-modes-lot-2a-v1 : 2 nouveaux flags pour les features Tour 2.A
      ['presence', 'Présence en direct', 'Compteur des participants connectés en temps réel.'],
      ['cta', 'Bannière CTA', 'Bouton d\'action contextuel pendant le live (devis, ressource…).'],
      ['lecture', 'Lecture seule', 'Les participants regardent uniquement, pas d\'envoi.']
    ];

    var container = A.el('div', { className: 'admin-form-checkboxes' });
    modeList.forEach(function (m) {
      var checkbox = A.el('input', {
        attrs: { type: 'checkbox', name: 'mode', value: m[0], checked: activeModes.indexOf(m[0]) !== -1 }
      });
      var inner = A.el('div', {
        children: [
          A.el('div', { className: 'admin-form-check-label', text: m[1] }),
          A.el('div', { className: 'admin-form-check-desc', text: m[2] })
        ]
      });
      container.appendChild(A.el('label', {
        className: 'admin-form-check',
        children: [checkbox, inner]
      }));
    });
    return container;
  }

  function buildOptionsCheckboxes(whiteLabel, subtitles) {
    var container = A.el('div', { className: 'admin-form-checkboxes' });
    [
      ['white_label', 'Marque blanche', 'Retire la mention « Propulsé par Nomacast ».', whiteLabel],
      ['subtitles', 'Sous-titrage live', 'Bandeau de sous-titres temps réel.', subtitles]
    ].forEach(function (o) {
      var checkbox = A.el('input', {
        attrs: { type: 'checkbox', name: o[0], checked: !!o[3] }
      });
      var inner = A.el('div', {
        children: [
          A.el('div', { className: 'admin-form-check-label', text: o[1] }),
          A.el('div', { className: 'admin-form-check-desc', text: o[2] })
        ]
      });
      container.appendChild(A.el('label', {
        className: 'admin-form-check',
        children: [checkbox, inner]
      }));
    });
    return container;
  }

  function buildAccessRadios(currentMode) {
    var container = A.el('div', { className: 'admin-form-checkboxes' });
    [
      ['public', 'Public', 'Lien direct partageable, pas d\'invitation nominative.'],
      ['private', 'Privé (sur invitation)', 'Chaque participant reçoit un magic link nominatif.']
    ].forEach(function (a) {
      var radio = A.el('input', {
        attrs: { type: 'radio', name: 'access_mode', value: a[0], checked: currentMode === a[0] }
      });
      var inner = A.el('div', {
        children: [
          A.el('div', { className: 'admin-form-check-label', text: a[1] }),
          A.el('div', { className: 'admin-form-check-desc', text: a[2] })
        ]
      });
      container.appendChild(A.el('label', {
        className: 'admin-form-check',
        children: [radio, inner]
      }));
    });
    return container;
  }

  // ============ Submit + Delete ============

  async function onSubmit(ev, form, btn) {
    btn.disabled = true;
    var originalText = btn.textContent;
    btn.textContent = 'Enregistrement…';

    var data = {
      title: form.title.value,
      client_name: form.client_name.value,
      scheduled_at: A.localInputToIso(form.scheduled_at.value),
      duration_minutes: form.duration_minutes.value,
      audience_estimate: form.audience_estimate.value || null,
      primary_color: form.primary_color.value,
      logo_url: form.logo_url.value.trim() || null,
      status: form.status.value,
      white_label: form.white_label.checked,
      subtitles: form.subtitles.checked,
      modes: Array.prototype.slice.call(form.querySelectorAll('input[name="mode"]:checked')).map(function (c) { return c.value; }),
      access_mode: form.access_mode.value || 'public'
    };
    // Fix 8 v2 : envoyer le slug si le champ est présent (= invitees_count === 0)
    if (form.slug) {
      data.slug = form.slug.value;
    }

    // Fix 8 v2 : confirmation explicite si le slug change (impact sur le lien admin client)
    if (form.slug && form.slug.value && form.slug.value !== ev.slug) {
      // Re-normaliser côté client pour montrer la valeur exacte qui sera enregistrée
      var newSlugPreview = (form.slug.value || '')
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+|-+$/g, '');
      if (newSlugPreview !== ev.slug) {
        var confirmMsg =
          'Tu modifies l\'URL de l\'event :\n\n' +
          '  Ancien : /chat/' + ev.slug + '\n' +
          '  Nouveau : /chat/' + newSlugPreview + '\n\n' +
          'IMPORTANT : cela change aussi le lien admin client (qui dépend du slug). ' +
          'Si tu as déjà partagé l\'ancien lien admin avec ton client, il deviendra invalide. ' +
          'Tu devras lui envoyer le nouveau lien après sauvegarde.\n\n' +
          'Confirmer ce changement ?';
        if (!window.confirm(confirmMsg)) {
          btn.disabled = false;
          btn.textContent = originalText;
          return;
        }
      }
    }

    try {
      var result = await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id), {
        method: 'PATCH',
        body: data
      });
      // Si le slug a changé, on doit re-render tout le form (URL publique, pageSub, etc.)
      var slugChanged = result.event.slug !== ev.slug;
      if (slugChanged) {
        A.showMessage(messageZone, 'success',
          'Slug modifié vers « /chat/' + result.event.slug + ' ». Le lien admin client a aussi changé : pense à renvoyer le nouveau lien à ton client si tu l\'avais déjà partagé.');
      } else {
        A.showMessage(messageZone, 'success', 'Modifications enregistrées.');
      }
      // Mettre à jour le badge statut
      statusBadge.textContent = A.statusLabel(result.event.status);
      statusBadge.className = 'admin-badge admin-badge-' + result.event.status;
      // Re-render le panneau URLs (pour refléter changement public↔privé / slug changé)
      A.clearNode(publicLinkZone);
      publicLinkZone.appendChild(renderUrlPanel(result.event));
      // nomacast-stream-card-v1 : card Streaming live
      publicLinkZone.appendChild(A.renderStreamCard(result.event, load));
      // nomacast-client-credentials-v1 : re-mount Accès client (slug/event changé)
      mountCredentials(result.event);
      // nomacast-stats-card-v1 : re-mount stats avec le nouvel event (status a pu changer)
      mountStats(result.event);
      if (slugChanged) {
        // Le slug a changé : re-render le form complet pour que le pageSub
        // et le hint du titre reflètent le nouveau slug
        renderForm(result.event);
      }
    } catch (err) {
      A.showMessage(messageZone, 'error', 'Enregistrement échoué : ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }

  async function onArchive(ev) {
    if (!A.confirmAction(
      'Archiver « ' + ev.title + ' » ?\n'
      + 'Le statut passera à « Terminé ». Les invités et leurs magic links restent en base.'
    )) return;
    try {
      var result = await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id), {
        method: 'PATCH',
        body: { status: 'ended' }
      });
      A.showMessage(messageZone, 'success', 'Event archivé. Statut → Terminé.');
      statusBadge.textContent = A.statusLabel(result.event.status);
      statusBadge.className = 'admin-badge admin-badge-' + result.event.status;
      // Rafraîchit le formulaire pour mettre à jour les boutons
      setTimeout(load, 500);
    } catch (err) {
      A.showMessage(messageZone, 'error', 'Archivage échoué : ' + err.message);
    }
  }

  async function onDelete(ev) {
    if (!A.confirmAction(
      'Supprimer définitivement « ' + ev.title + ' » ?\n'
      + 'Cette action est irréversible.'
    )) return;

    try {
      await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id), { method: 'DELETE' });
      window.location.href = '/admin/?deleted=1';
    } catch (err) {
      // Si 409 → des invités sont présents, on bloque
      A.showMessage(messageZone, 'error', err.message);
    }
  }

  // ============================================================
  // nomacast-client-credentials-v1 — Module "Accès client" (login + password)
  // ============================================================
  var credsLastGeneratedPassword = null; // affiché temporairement, jamais persisté

  async function mountCredentials(ev) {
    A.clearNode(credentialsZone);
    credentialsZone.appendChild(A.el('div', {
      className: 'admin-card',
      children: [A.el('div', {
        className: 'creds-card-body',
        children: [A.el('div', { className: 'creds-status-empty', text: 'Chargement de l\'accès client…' })]
      })]
    }));

    try {
      var data = await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id) + '/credentials');
      renderCredentialsCard(ev, data);
    } catch (err) {
      A.clearNode(credentialsZone);
      credentialsZone.appendChild(A.el('div', {
        className: 'admin-card',
        children: [A.el('div', {
          className: 'creds-card-body',
          children: [A.el('div', { className: 'stats-error', text: 'Erreur accès client : ' + err.message })]
        })]
      }));
    }
  }

  function renderCredentialsCard(ev, data) {
    var login = data.login || '';
    var hasPassword = !!data.has_password;

    var body = A.el('div', { className: 'creds-card-body' });
    body.appendChild(A.el('div', { className: 'creds-card-title', text: 'Accès client' }));
    body.appendChild(A.el('div', {
      className: 'creds-card-sub',
      text: 'Identifiants pour que le client accède à la page de gestion + régie sur /event-admin/login.'
    }));

    // Ligne LOGIN (édition inline)
    var loginRow = A.el('div', { className: 'creds-row' });
    loginRow.appendChild(A.el('div', { className: 'creds-row-label', text: 'Identifiant' }));
    var loginInput = A.el('input', {
      className: 'creds-login-input',
      attrs: {
        type: 'text', value: login,
        placeholder: ev.slug || 'identifiant-court',
        autocomplete: 'off', spellcheck: 'false'
      }
    });
    loginRow.appendChild(loginInput);
    var loginSaveBtn = A.el('button', {
      className: 'admin-btn admin-btn-secondary admin-btn-sm',
      attrs: { type: 'button' },
      text: 'Enregistrer'
    });
    loginSaveBtn.addEventListener('click', async function () {
      var newLogin = (loginInput.value || '').trim().toLowerCase();
      if (!newLogin) {
        A.showMessage(messageZone, 'error', 'L\'identifiant ne peut pas être vide.');
        return;
      }
      loginSaveBtn.disabled = true;
      loginSaveBtn.textContent = '…';
      try {
        var result = await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id) + '/credentials', {
          method: 'PUT', body: { login: newLogin }
        });
        A.showMessage(messageZone, 'success', 'Identifiant enregistré.');
        credsLastGeneratedPassword = null;
        // nomacast-client-credentials-v1 — sync ev avec la réponse pour que renderUrlPanel
        // affiche immédiatement le bon lien admin client (sans recharger la page)
        ev.client_login = result.login;

        // nomacast-client-credentials-v1 — sync ev avec la réponse pour que renderUrlPanel

        ev.client_login = result.login;

  // ============================================================
  // nomacast-stats-card-v1 — Module Statistiques
  // ============================================================
  var statsPollTimer = null;
  var statsCurrentEventId = null;
  var statsLastFetchAt = 0;
  var statsInFlight = false;

  function mountStats(ev) {
    // Cleanup polling existant
    if (statsPollTimer) { clearTimeout(statsPollTimer); statsPollTimer = null; }
    statsCurrentEventId = ev.id;

    A.clearNode(statsZone);
    statsZone.appendChild(A.el('div', {
      className: 'admin-card',
      children: [A.el('div', {
        className: 'admin-card-body',
        children: [A.el('div', { className: 'stats-loading', text: 'Chargement des statistiques…' })]
      })]
    }));

    fetchAndRenderStats(ev);

    // Polling 5s uniquement quand l'event est en direct
    if (ev.status === 'live') {
      scheduleStatsPoll(ev);
      // Pause polling si l'onglet n'est pas visible (économise les requêtes)
      if (!statsZone._visListener) {
        statsZone._visListener = function () {
          if (document.visibilityState === 'visible' && statsCurrentEventId === ev.id) {
            // Re-fetch immédiat au retour, puis poll régulier
            if (statsPollTimer) { clearTimeout(statsPollTimer); statsPollTimer = null; }
            fetchAndRenderStats(ev);
            scheduleStatsPoll(ev);
          }
        };
        document.addEventListener('visibilitychange', statsZone._visListener);
      }
    }
  }

  function scheduleStatsPoll(ev) {
    statsPollTimer = setTimeout(function () {
      if (statsCurrentEventId !== ev.id) return; // event a changé entre temps
      if (document.visibilityState !== 'visible') {
        scheduleStatsPoll(ev); // skip le tick mais reprogramme
        return;
      }
      fetchAndRenderStats(ev).then(function () {
        if (statsCurrentEventId === ev.id) scheduleStatsPoll(ev);
      });
    }, 5000);
  }

  async function fetchAndRenderStats(ev) {
    if (statsInFlight) return;
    statsInFlight = true;
    try {
      var stats = await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id) + '/stats');
      statsLastFetchAt = Date.now();
      // Si entre-temps l'utilisateur a quitté/changé d'event, on n'écrase pas
      if (statsCurrentEventId !== ev.id) return;
      renderStatsCard(ev, stats);
    } catch (err) {
      if (statsCurrentEventId !== ev.id) return;
      A.clearNode(statsZone);
      statsZone.appendChild(A.el('div', {
        className: 'admin-card',
        children: [A.el('div', {
          className: 'admin-card-body',
          children: [A.el('div', { className: 'stats-error', text: 'Erreur statistiques : ' + err.message })]
        })]
      }));
    } finally {
      statsInFlight = false;
    }
  }

  function renderStatsCard(ev, stats) {
    var s = stats.summary || {};
    var status = ev.status;

    var titleDot = A.el('span', {
      className: 'stats-card-title-dot' + (status === 'live' ? ' live' : '')
    });
    var titleText;
    if (status === 'draft') titleText = 'Statistiques — pré-événement';
    else if (status === 'live') titleText = 'Statistiques — en direct';
    else if (status === 'ended') titleText = 'Bilan de l\'événement';
    else titleText = 'Statistiques';

    var header = A.el('div', {
      className: 'stats-card-header',
      children: [
        A.el('div', {
          className: 'stats-card-title',
          children: [titleDot, A.el('span', { text: titleText })]
        }),
        A.el('div', {
          className: 'stats-card-meta',
          text: status === 'live'
            ? 'Mis à jour automatiquement toutes les 5s'
            : ('Calculé le ' + new Date(statsLastFetchAt || Date.now()).toLocaleTimeString('fr-FR'))
        })
      ]
    });

    var body = A.el('div', { className: 'admin-card-body' });
    body.appendChild(header);

    if (status === 'draft') {
      renderTilesDraft(body, s);
      renderPerInviteeTable(body, stats.per_invitee || [], status);
    } else if (status === 'live') {
      renderTilesLive(body, s);
      renderTimelineChart(body, stats.timeline || [], s.peak_concurrent || 0);
      renderTopChatters(body, stats.top_chatters || []);
      renderPerInviteeTable(body, stats.per_invitee || [], status);
    } else if (status === 'ended') {
      renderTilesEnded(body, s, ev);
      renderTimelineChart(body, stats.timeline || [], s.peak_concurrent || 0);
      renderTopChatters(body, stats.top_chatters || []);
      renderPerInviteeTable(body, stats.per_invitee || [], status);
      renderGeoAndSources(body, stats.geography || [], stats.traffic_sources || []);
    }

    A.clearNode(statsZone);
    statsZone.appendChild(A.el('div', { className: 'admin-card', children: [body] }));
  }

  function renderTilesDraft(parent, s) {
    var clickPct = s.invitations_sent > 0
      ? Math.round((s.invitees_clicked / s.invitations_sent) * 100)

    tiles.appendChild(tile('Clics uniques sur lien', String(s.invitees_clicked), clickPct + '% d\'engagement', true));

  function renderTilesLive(parent, s) {

  function renderTilesEnded(parent, s, ev) {
    var totalAttendees = (s.invitees_attended || 0) + (s.public_unique_viewers || 0);
    var attendPct = s.invitees_total > 0
      ? Math.round((s.invitees_attended / s.invitees_total) * 100)
      : null;
    var avgPct = ev.duration_minutes && s.avg_duration_seconds

      : 0;

    var tiles = A.el('div', { className: 'stats-tiles' });
    tiles.appendChild(tile('Présents au total', String(totalAttendees), attendPct !== null ? attendPct + '% des invités' : null, true));
    tiles.appendChild(tile('Pic concurrents', String(s.peak_concurrent)));
    tiles.appendChild(tile('Durée moyenne', formatSeconds(s.avg_duration_seconds), avgPct + '% du live'));
    tiles.appendChild(tile('Messages chat', String(s.messages_approved + s.qa_approved)));
    if (s.reactions_total > 0) tiles.appendChild(tile('Réactions', String(s.reactions_total)));
    if (s.polls_total > 0) tiles.appendChild(tile('Sondages', String(s.polls_total)));
    if (s.quotes_total > 0) tiles.appendChild(tile('Citations', String(s.quotes_total)));

  function tile(label, value, sub, highlight) {
    var t = A.el('div', { className: 'stats-tile' + (highlight ? ' highlight' : '') });
    t.appendChild(A.el('div', { className: 'stats-tile-label', text: label }));
    t.appendChild(A.el('div', { className: 'stats-tile-value', text: value }));
    if (sub) t.appendChild(A.el('div', { className: 'stats-tile-sub', text: sub }));
    return t;
  }

  function renderTimelineChart(parent, timeline, peak) {
    parent.appendChild(A.el('div', { className: 'stats-section-title', text: 'Courbe de présence' }));
    var wrap = A.el('div', { className: 'stats-chart-wrap' });
    if (!timeline.length) {
      wrap.appendChild(A.el('div', { className: 'stats-chart-empty', text: 'Aucune donnée de présence pour le moment.' }));
      parent.appendChild(wrap);
      return;
    }
    // SVG construit avec setAttribute pour respecter le namespace XML
    var w = 800, h = 180, padL = 40, padR = 12, padT = 12, padB = 26;
    var iw = w - padL - padR, ih = h - padT - padB;
    var maxY = Math.max(peak || 0, Math.max.apply(null, timeline.map(function (p) { return p.viewers; })), 1);
    // Petite marge en haut pour ne pas coller la courbe
    var topY = Math.ceil(maxY * 1.1);

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
    svg.setAttribute('class', 'stats-chart-svg');
    svg.setAttribute('preserveAspectRatio', 'none');

    // Grid horizontal (3 lignes)
    [0.25, 0.5, 0.75].forEach(function (frac) {
      var y = padT + ih * (1 - frac);
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', padL); line.setAttribute('y1', y);
      line.setAttribute('x2', w - padR); line.setAttribute('y2', y);
      line.setAttribute('stroke', '#e2e8f0');
      line.setAttribute('stroke-dasharray', '2 4');
      svg.appendChild(line);
    });

    // Y axis labels (0, max/2, max)
    [0, Math.round(topY / 2), topY].forEach(function (val, i) {
      var y = padT + ih * (1 - (val / topY));
      var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', padL - 6); t.setAttribute('y', y + 3);
      t.setAttribute('text-anchor', 'end');
      t.setAttribute('font-size', '10');
      t.setAttribute('fill', '#94a3b8');
      t.textContent = String(val);
      svg.appendChild(t);
    });

    // Polyline de la courbe
    var n = timeline.length;
    var points = timeline.map(function (p, i) {
      var x = padL + (n > 1 ? (i / (n - 1)) * iw : iw / 2);
      var y = padT + ih * (1 - p.viewers / topY);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');

    // Aire sous la courbe
    var areaPoints = points + ' ' + (padL + iw).toFixed(1) + ',' + (padT + ih) + ' ' + padL + ',' + (padT + ih);
    var area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    area.setAttribute('points', areaPoints);
    area.setAttribute('fill', '#5A98D6');
    area.setAttribute('fill-opacity', '0.12');
    svg.appendChild(area);

    var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    poly.setAttribute('points', points);
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', '#5A98D6');
    poly.setAttribute('stroke-width', '2');
    poly.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(poly);

    // Labels axe X : début, milieu, fin
    [0, Math.floor(n / 2), n - 1].forEach(function (i) {
      if (i < 0 || i >= n) return;
      var x = padL + (n > 1 ? (i / (n - 1)) * iw : iw / 2);
      var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', x); t.setAttribute('y', h - 8);
      t.setAttribute('text-anchor', i === 0 ? 'start' : (i === n - 1 ? 'end' : 'middle'));
      t.setAttribute('font-size', '10');
      t.setAttribute('fill', '#94a3b8');
      t.textContent = formatTimeOnly(timeline[i].ts);
      svg.appendChild(t);
    });

    wrap.appendChild(svg);
    parent.appendChild(wrap);
  }

  // ============ Helpers de formatage stats ============
  function formatSeconds(s) {
    s = parseInt(s, 10) || 0;
    if (s < 60) return s + 's';
    if (s < 3600) {
      var m = Math.floor(s / 60);
      var rs = s % 60;
      return rs > 0 ? m + 'min ' + rs + 's' : m + 'min';
    }
    var h = Math.floor(s / 3600);
    var mm = Math.floor((s % 3600) / 60);
    return mm > 0 ? h + 'h ' + mm + 'min' : h + 'h';
  }

  function formatTimeOnly(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function formatRelativeTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diffSec < 60) return 'il y a ' + diffSec + 's';
    if (diffSec < 3600) return 'il y a ' + Math.floor(diffSec / 60) + 'min';
    if (diffSec < 86400) return 'il y a ' + Math.floor(diffSec / 3600) + 'h';
    return formatTimeOnly(iso);
  }

  // ============================================================
  // nomacast-modes-compat-v1 / Lot D — UI désactivation cases incompatibles
  // ============================================================
  // Doit rester synchronisé avec validateModesCompatibility côté serveur
  // (functions/api/admin/events.js + functions/api/admin/events/[id].js).
  var MODE_INCOMPATIBLE_PAIRS = [
    ['lecture', 'qa'],
    ['lecture', 'libre'],
    ['lecture', 'sondages'],
    ['lecture', 'quiz'],
    ['lecture', 'nuage'],
    ['qa', 'libre']
  ];
  function refreshModesCompat(scopeEl) {
    var checks = scopeEl.querySelectorAll('input[name="mode"]');
    var checked = new Set();
    for (var i = 0; i < checks.length; i++) {
      if (checks[i].checked) checked.add(checks[i].value);
    }
    for (var j = 0; j < checks.length; j++) {
      var v = checks[j].value;
      var blocker = null;
      if (!checked.has(v)) {
        for (var k = 0; k < MODE_INCOMPATIBLE_PAIRS.length; k++) {
          var p = MODE_INCOMPATIBLE_PAIRS[k];
          if (p[0] === v && checked.has(p[1])) { blocker = p[1]; break; }
          if (p[1] === v && checked.has(p[0])) { blocker = p[0]; break; }
        }
      }
      checks[j].disabled = !!blocker;
      var labelEl = checks[j].closest('.admin-form-check');
      if (labelEl) {
        labelEl.style.opacity = blocker ? '0.45' : '';
        labelEl.style.cursor = blocker ? 'not-allowed' : '';
        labelEl.title = blocker ? 'Incompatible avec un mode déjà coché.' : '';
      }
    }
  }
  function setupModesCompat(scopeEl) {
    scopeEl.querySelectorAll('input[name="mode"]').forEach(function (cb) {
      cb.addEventListener('change', function () { refreshModesCompat(scopeEl); });
    });
    refreshModesCompat(scopeEl);
  }

  // ============================================================
  // nomacast-live-control-v1 — Bouton "Lancer le direct" / "Terminer le direct"
  // À côté de la card Streaming live, raccourci pour basculer le status sans
  // passer par la page régie. Le PATCH /api/admin/events/:id supporte déjà status.
  // ============================================================
  function renderLiveControlPanel(ev) {
    if (ev.status === 'ended') {
      // Event terminé : panel info, pas de bouton d'action
      var endedCard = A.el('div', { className: 'admin-card', style: { marginTop: '14px' } });
      var endedBody = A.el('div', { className: 'admin-card-body' });
      endedBody.appendChild(A.el('div', {
        style: { fontSize: '13px', color: '#64748b' },
        text: 'Événement terminé. Plus de bascule possible.'
      }));
      endedCard.appendChild(endedBody);
      return endedCard;
    }

    var card = A.el('div', { className: 'admin-card', style: { marginTop: '14px' } });
    var body = A.el('div', { className: 'admin-card-body' });

    if (ev.status === 'draft') {
      body.appendChild(A.el('div', {
        style: {
          fontSize: '14px', fontWeight: '700', color: '#0f172a', marginBottom: '6px',
          letterSpacing: '-0.01em'
        },
        text: 'Lancer le direct'
      }));
      body.appendChild(A.el('div', {
        style: { marginBottom: '14px', fontSize: '13px', color: '#64748b', lineHeight: '1.5' },
        text: 'Bascule l\'événement en direct. Les participants verront immédiatement la page live (rafraîchissement auto en moins de 10 secondes via le polling status).'
      }));
      var goLiveBtn = A.el('button', {
        className: 'admin-btn admin-btn-primary',
        attrs: { type: 'button' },
        text: '▶ Lancer le direct',
        style: { background: '#10b981', borderColor: '#10b981' }
      });
      goLiveBtn.addEventListener('click', async function () {
        if (!confirm('Lancer le direct maintenant ?\n\nLes participants seront immédiatement basculés sur la page live (dans les 5-10 secondes via leur polling).')) return;
        goLiveBtn.disabled = true;
        var originalText = goLiveBtn.textContent;
        goLiveBtn.textContent = 'Bascule…';
        try {
          await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id), {
            method: 'PATCH',
            body: { status: 'live' }
          });
          A.showMessage(messageZone, 'success', 'Direct lancé. Les participants vont basculer dans les 5-10 prochaines secondes (page live auto, sans rechargement manuel requis).');
          load();
        } catch (err) {
          A.showMessage(messageZone, 'error', 'Erreur : ' + err.message);
          goLiveBtn.disabled = false;
          goLiveBtn.textContent = originalText;
        }
      });
      body.appendChild(goLiveBtn);
    } else if (ev.status === 'live') {
      body.appendChild(A.el('div', {
        style: {
          fontSize: '14px', fontWeight: '700', color: '#0f172a', marginBottom: '6px',
          letterSpacing: '-0.01em'
        },
        children: [
          A.el('span', { style: {
            display: 'inline-block', width: '8px', height: '8px', borderRadius: '50%',
            background: '#dc2626', marginRight: '8px', verticalAlign: 'middle',
            animation: 'pulse 1.6s infinite'
          }}),
          document.createTextNode('Événement en direct')
        ]
      }));
      body.appendChild(A.el('div', {
        style: { marginBottom: '14px', fontSize: '13px', color: '#64748b', lineHeight: '1.5' },
        text: 'L\'événement est actuellement en direct. Termine-le quand le live est fini — les participants verront automatiquement la page "terminée" avec l\'historique des messages.'
      }));
      var endBtn = A.el('button', {
        className: 'admin-btn',
        attrs: { type: 'button' },
        text: '■ Terminer le direct',
        style: { background: '#dc2626', borderColor: '#dc2626', color: '#fff' }
      });
      endBtn.addEventListener('click', async function () {
        if (!confirm('Terminer le direct ?\n\nL\'événement passera en mode "ended" et les participants ne pourront plus envoyer de messages. Cette action est irréversible.')) return;
        endBtn.disabled = true;
        endBtn.textContent = 'Bascule…';
        try {
          await A.apiFetch('/api/admin/events/' + encodeURIComponent(ev.id), {
            method: 'PATCH',
            body: { status: 'ended' }
          });
          A.showMessage(messageZone, 'success', 'Direct terminé. Les participants vont voir la page "terminée" dans les prochaines secondes.');
          load();
        } catch (err) {
          A.showMessage(messageZone, 'error', 'Erreur : ' + err.message);
          endBtn.disabled = false;
          endBtn.textContent = '■ Terminer le direct';
        }
      });
      body.appendChild(endBtn);
    }

    card.appendChild(body);
    return card;
  }

  load();
})();
</script>
