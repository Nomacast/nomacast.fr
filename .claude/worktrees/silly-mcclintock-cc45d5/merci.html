<style>

/* Reset et Variables - R1 appliqué sur commentaires */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0b1929;
  --cyan: #0ea5e9;
  --cyan-light: #e0f2fe;
  --off-white: #f3f6fa;
  --border: #dae4f0;

body {

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 64px 56px;
  max-width: 540px;
  width: 100%;
  text-align: center;
  box-shadow: 0 4px 40px rgba(11,25,41,0.06);
}
.icon {
  width: 72px; height: 72px;
  background: var(--cyan-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}
.icon svg { width: 32px; height: 32px; color: var(--cyan); }
h1 {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 14px;
  line-height: 1.2;
}
p {
  font-size: 16px;
  font-weight: 300;
  color: #4d6b8a;
  line-height: 1.65;
  margin-bottom: 8px;
}
p strong { color: var(--ink); font-weight: 600; }
.divider {
  height: 1px;
  background: var(--border);
  margin: 32px 0;
}
.meta {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 36px;
}
.meta-item {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
}
.meta-item svg { width: 16px; height: 16px; color: var(--cyan); flex-shrink: 0; }
.btn-home {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--cyan);
  color: white;
  padding: 14px 28px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.2s;
  box-shadow: 0 4px 16px rgba(14,165,233,0.25);
}
.btn-home:hover { background: #0284c7; }
.logo {
  margin-top: 40px;

  font-size: 14px;
  font-weight: 700;
  color: #a3bcd4;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  justify-content: center;

.logo-dot { width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; opacity: 0.5; }
