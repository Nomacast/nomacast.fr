name: Lighthouse — Audit performance & SEO

# ─────────────────────────────────────────────────────────────────────────────
# Audit Lighthouse automatique après chaque push sur main.
#
# Se déclenche uniquement si des fichiers visibles changent (HTML/CSS/JS/images).
# Ignore les pushes de docs, workflows, ou worktrees Claude.
#
# Attend 90s que Cloudflare Pages déploie, puis audite les pages clés.
# Les rapports sont uploadés et accessibles via une URL temporaire publique.
# Tu peux aussi consulter les scores dans les logs du workflow.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'
      - '.github/**'
      - '.claude/**'
      - 'lighthouse-results/**'
      - '*.report.html'
  workflow_dispatch:  # lancement manuel possible

jobs:
  lighthouse:
    name: Run Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Attente déploiement Cloudflare Pages
        run: |
          echo "→ Attente 90s que Cloudflare Pages déploie le push..."
          sleep 90

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse
        with:
          # URLs à auditer — les pages les plus stratégiques pour le SEO et la conversion
          urls: |
            https://nomacast.fr/
            https://nomacast.fr/tarifs.html
            https://nomacast.fr/cas-clients.html
            https://nomacast.fr/captation-evenement-entreprise.html
            https://nomacast.fr/captation-conference-seminaire.html
            https://nomacast.fr/en/
            https://nomacast.fr/en/pricing.html
          # Lance Lighthouse 1 fois par URL (suffit pour détecter régressions)
          runs: 1
          # Upload les rapports HTML sur storage public temporaire (URL valide 7 jours)
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Résumé des scores
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Rapports Lighthouse disponibles dans les artifacts du run"
          echo "  + URLs publiques temporaires (7 jours) listées ci-dessus"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
