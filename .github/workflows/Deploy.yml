name: Deploy Nomacast

on:
  push:
    branches: [main]
  workflow_dispatch:

# Si un nouveau push arrive pendant qu'un deploy tourne, on annule
# l'ancien et on ne garde que le dernier. C'est ce qui empêche
# toute file de s'empiler quand la sync Drive pousse plusieurs commits.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=nomacast --branch=main --commit-dirty=true
